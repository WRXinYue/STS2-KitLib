name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore solution
        run: dotnet restore KitLib.sln

      - name: Verify STS2 ref DLLs (required for dotnet format)
        run: |
          test -f eng/sts2-refs/beta/0.109.0/data_sts2_windows_x86_64/sts2.dll
          test -f eng/sts2-refs/beta/0.109.0/data_sts2_windows_x86_64/0Harmony.dll

      - name: Format check
        run: |
          STS2_DIR="$(python3 scripts/resolve_sts2_profile_dir.py)"
          printf '%s\n' \
            '<Project>' \
            '  <PropertyGroup>' \
            "    <Sts2Dir>${STS2_DIR}</Sts2Dir>" \
            '    <Sts2Profile>beta</Sts2Profile>' \
            '  </PropertyGroup>' \
            '</Project>' > local.props
          dotnet format KitLib.sln --verify-no-changes

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Lint Python scripts
        run: |
          uv sync
          uv run flake8 scripts

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Verify STS2 ref DLLs
        run: |
          test -f eng/sts2-refs/beta/0.109.0/data_sts2_windows_x86_64/sts2.dll

      - name: Build
        run: make build

      - name: API touchpoint check
        run: make check-api

      - name: Content mod smoke fixture
        run: |
          STS2_DIR="$(python3 scripts/resolve_sts2_profile_dir.py)"
          printf '%s\n' \
            '<Project>' \
            '  <PropertyGroup>' \
            "    <Sts2Dir>${STS2_DIR}</Sts2Dir>" \
            '    <Sts2Profile>beta</Sts2Profile>' \
            '  </PropertyGroup>' \
            '</Project>' > local.props
          make check-smoke-mod
